// MATH / OLS
// ═══════════════════════════════════════════════════════════════════════
function tr(M){return M[0].map((_,j)=>M.map(r=>r[j]))}
function mm(A,B){const C=Array.from({length:A.length},()=>new Array(B[0].length).fill(0));for(let i=0;i<A.length;i++)for(let k=0;k<B.length;k++)for(let j=0;j<B[0].length;j++)C[i][j]+=A[i][k]*B[k][j];return C}
function mv(M,v){return M.map(r=>r.reduce((s,x,j)=>s+x*v[j],0))}
function minv(M){
  const n=M.length,a=M.map((row,i)=>[...row,...Array.from({length:n},(_,j)=>+(i===j))]);
  for(let c=0;c<n;c++){let p=c;for(let r=c+1;r<n;r++)if(Math.abs(a[r][c])>Math.abs(a[p][c]))p=r;[a[c],a[p]]=[a[p],a[c]];if(Math.abs(a[c][c])<1e-12)return null;for(let r=0;r<n;r++){if(r===c)continue;const fv=a[r][c]/a[c][c];for(let j=0;j<2*n;j++)a[r][j]-=fv*a[c][j]}const pv=a[c][c];for(let j=0;j<2*n;j++)a[c][j]/=pv}
  return a.map(r=>r.slice(n));
}
function ols(X0,y){
  const n=X0.length,p=X0[0]?.length??0;if(n<p+2)return null;
  const X=X0.map(r=>[1,...r]),Xt=tr(X),iv=minv(mm(Xt,X));if(!iv)return null;
  const b=mv(iv,mv(Xt,y)),yhat=X.map(r=>r.reduce((s,v,i)=>s+v*b[i],0));
  const res=y.map((yi,i)=>yi-yhat[i]),ym=y.reduce((a,c)=>a+c)/n;
  const ss=y.reduce((s,yi)=>s+(yi-ym)**2,0),sse=res.reduce((s,r)=>s+r**2,0);
  const r2=ss<1e-12?1:1-sse/ss;
  return{b,yhat,r2,r2a:1-(1-r2)*(n-1)/Math.max(n-p-1,1),rmse:Math.sqrt(sse/n),mae:res.reduce((s,r)=>s+Math.abs(r),0)/n,n,p,residuals:res};
}
function pcorr(x,y){
  const n=x.length,mx=x.reduce((a,b)=>a+b)/n,my=y.reduce((a,b)=>a+b)/n;
  const num=x.reduce((s,xi,i)=>s+(xi-mx)*(y[i]-my),0);
  const den=Math.sqrt(x.reduce((s,xi)=>s+(xi-mx)**2,0)*y.reduce((s,yi)=>s+(yi-my)**2,0));
  return den<1e-10?0:num/den;
}
function corrMat(cols){return cols.map(ci=>cols.map(cj=>pcorr(ci,cj)))}

}

function aoRunM(varKeys){
  if(!varKeys.length)return null;
  const rows=AO_DATA.filter(d=>d.prem!==null&&varKeys.every(k=>aoGV(d,k)!==null));
  if(rows.length<varKeys.length+2)return null;
  const res=ols(rows.map(d=>varKeys.map(k=>aoGV(d,k))),rows.map(d=>d.prem));
  return res?{...res,rows,varKeys}:null;
}
function afRunM(varKeys){
  if(!varKeys.length)return null;
  const rows=AF_DATA.filter(d=>d.freq!==null&&varKeys.every(k=>afGV(d,k)!==null));
  if(rows.length<varKeys.length+2)return null;
  const res=ols(rows.map(d=>varKeys.map(k=>afGV(d,k))),rows.map(d=>d.freq));
  return res?{...res,rows,varKeys}:null;
}
function aoPredict(mdl,sim){
  let bi=1,pred=mdl.b[0];
  for(const k of mdl.varKeys){if(sim[k]==null)return null;pred+=mdl.b[bi]*sim[k];bi++}
  return pred;
}
function afPredict(mdl,sim){
  let bi=1,pred=mdl.b[0];
  for(const k of mdl.varKeys){if(sim[k]==null)return null;pred+=mdl.b[bi]*sim[k];bi++}
  return pred;
}

// COMPUTE (runs on every render)
// ═══════════════════════════════════════════════════════════════════════
let C={};
function compute(){
  // ── Blocco A: Frequency OLS
  const m1rows=DATA.filter(d=>d.frequency!==null&&(!S.avCarb||d.carburante!==null)&&(!S.avPax||d.paxKm!==null));
  const m1X=m1rows.map(d=>{const r=[];if(S.avCarb)r.push(d.carburante);if(S.avPax)r.push(d.paxKm);return r});
  const m1=m1rows.length>0&&m1X[0]?.length>0?ols(m1X,m1rows.map(d=>d.frequency)):null;
  function calcPredF(c,p){
    if(!m1)return null;let bi=1,pred=m1.b[0];
    if(S.avCarb){pred+=m1.b[bi]*c;bi++}if(S.avPax){pred+=m1.b[bi]*p}return pred;
  }
  // ── Add-on Frequenza
  const afCustomVars=[...(S.afAvPax?['pax']:[]),...(S.afAvCarb?['carb']:[]),...(S.afAvStock?['stock']:[]),...(S.afAvPaxIdx?['paxIdx']:[])];
  const afSim2026={pax:S.afPax2026,carb:S.afCarb2026,stock:S.afStock2026,paxIdx:S.afPaxIdx2026};
  const allAfResults=[
    ...AF_MDEFS.map(md=>{const model=afRunM(md.vars);return{...md,model,pred26:model?afPredict(model,afSim2026):null}}),
    (()=>{const model=afRunM(afCustomVars);return{id:'F',n:'F — Personalizzato',vars:afCustomVars,model,pred26:model?afPredict(model,afSim2026):null}})(),
  ];
  const sortedAf=[...allAfResults].filter(r=>r.model).sort((a,b)=>(b.model.r2a??0)-(a.model.r2a??0));
  const autoBestAfId=sortedAf[0]?.id??'';
  const afBestId=S.afManualId||autoBestAfId;
  const afBest=allAfResults.find(r=>r.id===afBestId)??sortedAf[0]??null;
  const predF_af=afBest?.pred26??null;
  // Blocco A always uses Add-on Frequency model; fall back to base only if no add-on available
  const predF0=predF_af!==null?predF_af:calcPredF(S.carb,S.paxKm);
  const effF=predF0;
  // ── Blocco B: Premio base OLS
  const m2rows=DATA.filter(d=>d.premio!==null&&(!S.avFreq||d.frequency!==null)&&(!S.avSev||d.severity!==null));
  const m2X=m2rows.map(d=>{const r=[];if(S.avFreq)r.push(d.frequency);if(S.avSev)r.push(d.severity);return r});
  const m2=m2rows.length>0&&m2X[0]?.length>0?ols(m2X,m2rows.map(d=>d.premio)):null;
  const sev2026=S.avInfl?S.severity*(1+S.inflazione/100):S.severity;
  // ── Add-on Premio
  const aoSevAdj=S.aoSev*(1+S.aoInfl);
  const aoLc2026=S.aoFreq*aoSevAdj;
  const aoSim={freq:S.aoFreq,sev:aoSevAdj,lc:aoLc2026,lag1:431.8,eur:S.aoEur,inflD:S.aoInfl};
  const customVarsAo=[...(S.avFreqAo?['freq']:[]),...(S.avSevAo?['sev']:[]),...(S.avLc?['lc']:[]),...(S.avLag1?['lag1']:[]),...(S.avEurOn?['eur']:[]),...(S.avInflD?['inflD']:[])];
  const allAoResults=[
    ...AO_MDEFS.map(md=>{const model=aoRunM(md.vars);return{...md,model,pred26:model?aoPredict(model,aoSim):null}}),
    (()=>{const model=aoRunM(customVarsAo);return{id:'F',n:'F — Personalizzato',vars:customVarsAo,diag:false,model,pred26:model?aoPredict(model,aoSim):null}})(),
  ];
  const rankable=allAoResults.filter(r=>!r.diag&&r.model);
  const sortedAo=[...rankable].sort((a,b)=>(b.model.r2a??0)-(a.model.r2a??0));
  const autoBestId=sortedAo[0]?.id??'';
  const aoBestId=S.aoManualId||autoBestId;
  const aoBest=allAoResults.find(r=>r.id===aoBestId)??sortedAo[0]??null;
  // ── Main Premio add-on prediction (driven by Simulatore sliders)
  const mainSevAdj=S.severity*(1+S.inflazione/100);
  const mainFreqDec=effF!==null?effF/100:S.aoFreq;
  const mainLc=mainFreqDec*mainSevAdj;
  const mainAoSim={freq:mainFreqDec,sev:mainSevAdj,lc:mainLc,lag1:431.8,eur:S.euriborB/100,inflD:S.inflazione/100};
  const pred26main=aoBest?.model?aoPredict(aoBest.model,mainAoSim)??null:null;
  const lastF=DATA.filter(d=>d.frequency!==null).pop()?.frequency??null;
  const lastP=DATA.filter(d=>d.premio!==null).pop()?.premio??null;
  const dF=predF0!==null&&lastF!==null?predF0-lastF:null;
  const dP=pred26main!==null&&lastP!==null?pred26main-lastP:null;
  // ── Multicollinearity Blocco A
  const bothM1=S.avCarb&&S.avPax&&m1rows.length>2;
  const m1corr=bothM1?corrMat([m1rows.map(d=>d.carburante),m1rows.map(d=>d.paxKm)]):[[1,0],[0,1]];
  const m1vif=bothM1&&m1rows.length>3?calcVIF(m1rows.map(d=>[d.carburante,d.paxKm])):[1,1];
  // ── Multicollinearity AO full matrix
  const vk6=['freq','sev','lc','lag1','eur','inflD'];
  const rows6=AO_DATA.filter(d=>d.prem!==null&&vk6.every(k=>aoGV(d,k)!==null));
  const cols6=vk6.map(k=>rows6.map(d=>aoGV(d,k)));
  const cm6=rows6.length>=3?corrMat(cols6):null;
  C={m1,m1rows,m2,m2rows,predF0,effF,sev2026,pred26main,
    lastF,lastP,dF,dP,aoBest,aoBestId,allAoResults,sortedAo,
    afBest,afBestId,allAfResults,sortedAf,afCustomVars,
    aoSevAdj,aoLc2026,mainAoSim,
    bothM1,m1corr,m1vif,cm6,vk6,rows6,
    calcPredF,customVarsAo,afSim2026,mainSevAdj,mainFreqDec,mainLc,
    m2rows};
}

const COLORS=['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2'];
function fi(v){return v==null?'—':Math.round(v).toLocaleString('en-US')}
function ff(v,d=2){return v==null?'—':v.toFixed(d)}
function fv(v){return v!=null&&v>=0?'+'+v.toFixed(1):v!=null?v.toFixed(1):'—'}

// Main line chart — returns SVG string
function mkChart(opts){
  // pad.b must be large enough for x-labels (16px) + legend (22px) = 38px minimum
  const{series,labels,W=700,H=260,yLabel='',pad={l:58,r:20,t:36,b:58}}=opts;
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const allV=series.flatMap(s=>s.data.filter(v=>v!=null&&isFinite(v)));
  if(!allV.length)return `<div style="color:var(--text3);font-size:12px;padding:20px">Nessun dato</div>`;
  let yMin=Math.min(...allV),yMax=Math.max(...allV);
  const margin=(yMax-yMin)*0.08||1;yMin-=margin;yMax+=margin;
  const n=labels.length;
  const px=i=>pad.l+(i/(n-1||1))*iW;
  const py=v=>pad.t+iH-(v-yMin)/(yMax-yMin||1)*iH;
  // grid + axes labels
  let g='',xg='',paths='',dots='',legend='';
  for(let i=0;i<=4;i++){const v=yMin+(yMax-yMin)*i/4;const y=py(v);g+=`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${pad.l+iW}" y2="${y.toFixed(1)}" stroke="#e2e8f0" stroke-width="1"/>`;g+=`<text x="${pad.l-5}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#94a3b8">${v.toFixed(v>100?0:1)}</text>`}
  labels.forEach((lbl,i)=>{xg+=`<text x="${px(i).toFixed(1)}" y="${(pad.t+iH+16).toFixed(1)}" text-anchor="middle" font-size="9" fill="#94a3b8">${lbl}</text>`});
  // Legend baseline: 36px below chart bottom (after x-labels)
  const legY=pad.t+iH+36;
  series.forEach((s,si)=>{
    const col=s.color||COLORS[si%COLORS.length];
    const pts=s.data.map((v,i)=>({v,i})).filter(p=>p.v!=null&&isFinite(p.v));
    if(!pts.length)return;
    const d=pts.map((p,pi)=>`${pi===0?'M':'L'}${px(p.i).toFixed(1)},${py(p.v).toFixed(1)}`).join(' ');
    const dash=s.dashed?'stroke-dasharray="5,3"':'';
    paths+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="${s.w||2}" ${dash} opacity="${s.op||1}"/>`;
    pts.forEach(p=>{
      const tip=`${labels[p.i]}: ${p.v.toFixed(s.dec??1)}${s.unit||''}`;
      const r=s.big?7:4;
      const extra=s.big?`stroke="black" stroke-width="2"`:'';
      dots+=`<circle cx="${px(p.i).toFixed(1)}" cy="${py(p.v).toFixed(1)}" r="${r}" fill="${col}" fill-opacity="${s.big?1:.85}" ${extra} data-tip="${tip}" style="cursor:pointer"/>`;
    });
    // Legend: absolute positioning — start at pad.l, spread 140px each
    const lx=pad.l+si*145;
    legend+=`<line x1="${lx}" y1="${legY}" x2="${lx+18}" y2="${legY}" stroke="${col}" stroke-width="2.5" ${dash}/><text x="${lx+22}" y="${legY+4}" font-size="10" fill="#475569">${s.name}</text>`;
  });
  return`<svg width="${W}" height="${H}" style="display:block;max-width:100%">
    ${g}${xg}
    <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+iH}" stroke="#94a3b8" stroke-width="1"/>
    <line x1="${pad.l}" y1="${pad.t+iH}" x2="${pad.l+iW}" y2="${pad.t+iH}" stroke="#94a3b8" stroke-width="1"/>
    ${paths}${dots}
    <text x="${pad.l}" y="18" font-size="10" fill="#64748b" font-weight="500">${yLabel}</text>
    ${legend}
  </svg>`;
}

function mkScatter(pts,sim,xl,yl,W=340,H=220){
  if(!pts.length)return`<div style="color:var(--text3);font-size:12px">Nessun dato</div>`;
  const pad={l:52,r:14,t:14,b:40};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const allX=pts.map(p=>p.x).concat(sim?[sim.x]:[]);
  const allY=pts.map(p=>p.y).concat(sim?[sim.y]:[]);
  let xMin=Math.min(...allX),xMax=Math.max(...allX),yMin=Math.min(...allY),yMax=Math.max(...allY);
  const xm=(xMax-xMin)*0.08||0.5,ym=(yMax-yMin)*0.08||5;
  xMin-=xm;xMax+=xm;yMin-=ym;yMax+=ym;
  const px=x=>pad.l+(x-xMin)/(xMax-xMin)*iW;
  const py=y=>pad.t+iH-(y-yMin)/(yMax-yMin)*iH;
  const fitRes=ols(pts.map(p=>[p.x]),pts.map(p=>p.y));
  let g='',content='';
  for(let i=0;i<=3;i++){const xv=xMin+(xMax-xMin)*i/3;const yv=yMin+(yMax-yMin)*i/3;g+=`<line x1="${pad.l}" y1="${py(yv).toFixed(1)}" x2="${pad.l+iW}" y2="${py(yv).toFixed(1)}" stroke="#e2e8f0" stroke-width="1"/><text x="${pad.l-5}" y="${(py(yv)+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#94a3b8">${yv.toFixed(0)}</text>`;g+=`<text x="${px(xv).toFixed(1)}" y="${pad.t+iH+14}" text-anchor="middle" font-size="8" fill="#94a3b8">${xv.toFixed(2)}</text>`}
  if(fitRes){const x1=xMin,x2=xMax,y1=fitRes.b[0]+fitRes.b[1]*x1,y2=fitRes.b[0]+fitRes.b[1]*x2;content+=`<line x1="${px(x1).toFixed(1)}" y1="${py(y1).toFixed(1)}" x2="${px(x2).toFixed(1)}" y2="${py(y2).toFixed(1)}" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" opacity=".6"/>`}
  pts.forEach(p=>{content+=`<circle cx="${px(p.x).toFixed(1)}" cy="${py(p.y).toFixed(1)}" r="4" fill="#2563eb" fill-opacity=".7" data-tip="Anno ${p.lbl}\nX: ${p.x.toFixed(3)}\nY: ${p.y.toFixed(2)}" style="cursor:pointer"/>`;content+=`<text x="${(px(p.x)+5).toFixed(1)}" y="${(py(p.y)-3).toFixed(1)}" font-size="7" fill="#94a3b8">${p.lbl}</text>`});
  if(sim){content+=`<circle cx="${px(sim.x).toFixed(1)}" cy="${py(sim.y).toFixed(1)}" r="8" fill="none" stroke="#1e293b" stroke-width="2" data-tip="2026 (sim)\nX: ${sim.x.toFixed(3)}\nY: ${sim.y.toFixed(2)}" style="cursor:pointer"/>`;content+=`<circle cx="${px(sim.x).toFixed(1)}" cy="${py(sim.y).toFixed(1)}" r="3" fill="#1e293b"/>`;content+=`<text x="${(px(sim.x)+10).toFixed(1)}" y="${(py(sim.y)-4).toFixed(1)}" font-size="8" fill="#1e293b" font-weight="600">2026</text>`}
  return`<svg width="${W}" height="${H}" style="display:block;max-width:100%">
    ${g}
    <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+iH}" stroke="#94a3b8"/>
    <line x1="${pad.l}" y1="${pad.t+iH}" x2="${pad.l+iW}" y2="${pad.t+iH}" stroke="#94a3b8"/>
    ${content}
    <text x="${pad.l+iW/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#475569">${xl}</text>
    <text x="12" y="${pad.t+iH/2}" text-anchor="middle" font-size="9" fill="#475569" transform="rotate(-90 12 ${pad.t+iH/2})">${yl}</text>
  </svg>`;
}

function mkFitChart(yrs,obs,yhat,yLabel,W=340,H=200){
  const labels=yrs.map(String);

function mkResidChart(yrs,residuals,W=340,H=180){
  const labels=yrs.map(String);
  const maxAbs=Math.max(...residuals.map(Math.abs),1);
  const pad={l:58,r:20,t:24,b:40};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const n=labels.length;
  const px=i=>pad.l+(i/(n-1||1))*iW;
  const py=v=>pad.t+iH/2-v/(maxAbs*1.2)*iH/2;
  let g=`<line x1="${pad.l}" y1="${pad.t+iH/2}" x2="${pad.l+iW}" y2="${pad.t+iH/2}" stroke="#94a3b8" stroke-dasharray="4,2" stroke-width="1"/>`;
  labels.forEach((l,i)=>{g+=`<text x="${px(i)}" y="${pad.t+iH+14}" text-anchor="middle" font-size="9" fill="#94a3b8">${l}</text>`});
  let bars='';
  residuals.forEach((r,i)=>{
    const col=r>=0?'#16a34a':'#dc2626';
    const y0=py(0),y1=py(r),top=Math.min(y0,y1),h=Math.abs(y0-y1)||2;
    bars+=`<rect x="${(px(i)-5).toFixed(1)}" y="${top.toFixed(1)}" width="10" height="${h.toFixed(1)}" fill="${col}" opacity=".7" data-tip="${labels[i]}: residuo ${r.toFixed(2)}" style="cursor:pointer"/>`;
  });
  return`<svg width="${W}" height="${H}" style="display:block;max-width:100%">${g}${bars}</svg>`;
}

  // ── Blocco B sliders — driven by active Premio Add-on model
  const activeVars=aoBest?.model?.varKeys??[];

  if(activeVars.includes('eur'))blBSliders+=sldr('euriborB','EURIBOR 3M 2026 (%)',-1,6,0.001,'%',S.euriborB);

    :'<div class="callout warn">Vai ad <strong>Add-on Frequenza</strong> per selezionare il modello.</div>';
  const aoCallout=aoBest
    ?`<div class="callout info"><strong>Modello Premio attivo: ${aoBest.n}</strong><br>Variabili: ${aoBest.vars.map(k=>AO_VLBL[k]).join(' + ')}${activeVars.includes('sev')||activeVars.includes('lc')?' | Severity → modifica slider':''}${activeVars.includes('eur')?' | EURIBOR → modifica slider':''}</div>`
    :'<div class="callout warn">Nessun modello Premio selezionato. Vai ad <strong>Add-on Premio</strong>.</div>';

  return`<div class="g2">
    <!-- ── Blocco A ── -->
    <div class="card">
      <h2>📊 Blocco A — Frequency RC AUTO</h2>
      ${afCallout}
      ${blASliders}
      <div class="row" style="margin-top:6px;margin-bottom:12px">
        <button class="btn" onclick="S.paxKm=950;S.carb=1.69;S.afStock2026=41.3;S.afPaxIdx2026=89.3;rerender()">↺ Reset variabili Blocco A</button>
      </div>
      <div class="g3">
        <div class="stat${dF!=null&&dF>0?' warn':dF!=null&&dF<0?' suc':''}">
          <div class="val">${predF0!=null?predF0.toFixed(3)+'%':'—'}</div>
          <div class="lbl">Frequency stim. 2026</div>
        </div>
        <div class="stat">
          <div class="val">${lastF!=null?lastF.toFixed(3)+'%':'—'}</div>
          <div class="lbl">Ultima reale (2025)</div>
        </div>
        <div class="stat${dF!=null?(dF>0?' warn':' suc'):''}">
          <div class="val">${dF!=null?(dF>=0?'+':'')+dF.toFixed(3)+'%':'—'}</div>
          <div class="lbl">Δ vs 2025</div>
        </div>
      </div>
      <div class="chart-wrap">${chartFreq}</div>
    </div>

    <!-- ── Blocco B ── -->
    <div class="card">
      <h2>💰 Blocco B — Premio RC AUTO</h2>
      ${aoCallout}
      ${blBSliders}
      <div class="row" style="margin-top:6px;margin-bottom:12px">
        <button class="btn" onclick="S.severity=4963;S.inflazione=1.5;S.euriborB=2.736;rerender()">↺ Reset variabili Blocco B</button>
      </div>
      <div class="g3">
        <div class="stat suc">
          <div class="val">${pred26main!=null?Math.round(pred26main).toLocaleString('en-US')+' €':'—'}</div>
          <div class="lbl">Premio stim. 2026</div>
        </div>
        <div class="stat">
          <div class="val">${lastP!=null?lastP.toFixed(1)+' €':'—'}</div>
          <div class="lbl">Ultimo reale (2025)</div>
        </div>
        <div class="stat${dP!=null?(dP>0?' warn':' suc'):''}">
          <div class="val">${dP!=null?(dP>=0?'+':'')+dP.toFixed(1)+' €':'—'}</div>
          <div class="lbl">Δ vs 2025</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">
        Sev adj: ${C.mainSevAdj!=null?Math.round(C.mainSevAdj).toLocaleString('en-US')+' €':'—'} |
        LossCost: ${C.mainLc!=null?C.mainLc.toFixed(2):'—'} € |
        Freq dec.: ${C.mainFreqDec!=null?C.mainFreqDec.toFixed(5):'—'}
      </div>
      <div class="chart-wrap">${chartPrem}</div>
    </div>
  </div>
  <div class="card" style="background:var(--info-bg);border-color:var(--info-b)">
    <h3 style="color:var(--ac)">ℹ️ Note metodologiche</h3>
    <div style="font-size:12px;color:var(--text2);line-height:1.7">
      <strong>Inflazione:</strong> aggiusta Severity (non è regressore diretto): Sev_adj = Sev × (1+infl%) = ${C.mainSevAdj!=null?Math.round(C.mainSevAdj).toLocaleString('en-US')+' €':'—'}<br>
      <strong>Premio lag1:</strong> 431.8 € (Premio 2025, fisso)<br>
      <strong>Modello Freq attivo:</strong> ${afBest?.n??'—'} | Var: ${afBest?.vars?.map(k=>AF_VLBL[k]).join(', ')??'—'}<br>
      <strong>Modello Premio attivo:</strong> ${aoBest?.n??'—'} | Var: ${aoBest?.vars?.map(k=>AO_VLBL[k]).join(', ')??'—'}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// TAB 2 — SPIEGAZIONE MODELLI
// ═══════════════════════════════════════════════════════════════════════
function renderModels(){
  const{m1,m1rows,aoBest,bothM1,m1corr,m1vif,cm6,vk6,rows6}=C;
  const subNav=`<div class="sub-nav">
    <button class="${S.modelPage==='model1'?'active':''}" onclick="S.modelPage='model1';rerender()">Blocco A — Frequency</button>
    <button class="${S.modelPage==='modelAo'?'active':''}" onclick="S.modelPage='modelAo';rerender()">Blocco B — Premio (Add-on)</button>
  </div>`;
  let content='';
  if(S.modelPage==='model1'){
    const scatCarb=m1rows.filter(d=>d.carburante!==null).map(d=>({x:d.carburante,y:d.frequency,lbl:String(d.anno)}));
    const scatPax=m1rows.filter(d=>d.paxKm!==null).map(d=>({x:d.paxKm,y:d.frequency,lbl:String(d.anno)}));
    const simCarb=S.avCarb&&C.predF0!=null?{x:S.carb,y:C.predF0}:null;
    const simPax=S.avPax&&C.predF0!=null?{x:S.paxKm,y:C.predF0}:null;
    if(!m1){content=`<div class="callout err">Dati insufficienti. Attiva almeno un predittore.</div>`}
    else{
      const coefRows=[`<tr><td>Intercetta</td><td>${m1.b[0].toFixed(4)}</td><td>—</td><td>Freq. base</td></tr>`];
      let bi=1;
      if(S.avCarb)coefRows.push(`<tr><td>Carburante €/litro</td><td>${m1.b[bi].toFixed(5)}</td><td>${m1.b[bi]>=0?'+':'−'}</td><td>${m1.b[bi]>=0?'Carb↑ → freq↑':'Carb↑ → freq↓'}</td></tr>`),bi++;
      if(S.avPax)coefRows.push(`<tr><td>PaxKm (mln)</td><td>${m1.b[bi].toFixed(5)}</td><td>${m1.b[bi]>=0?'+':'−'}</td><td>${m1.b[bi]>=0?'Mob↑ → freq↑':'Mob↑ → freq↓'}</td></tr>`);
      content=`<h2>Blocco A — Modello Frequency</h2>
        <div style="color:var(--text2);font-size:12px;margin-bottom:14px">OLS: Frequency ~ Carburante (€/litro) + PaxKm. Per modelli più sofisticati vai ad <strong>Add-on Frequenza</strong>.</div>
        <div class="g2">
          <div>
            <h3>Metriche</h3>
            <table><thead><tr><th>Metrica</th><th>Valore</th></tr></thead><tbody>
              <tr><td>Periodo</td><td>${m1rows[0].anno}–${m1rows[m1rows.length-1].anno}</td></tr>
              <tr><td>Osservazioni</td><td>${m1.n}</td></tr>
              <tr><td>R²</td><td>${m1.r2.toFixed(4)}</td></tr>
              <tr><td>R² adj</td><td>${m1.r2a.toFixed(4)}</td></tr>
              <tr><td>RMSE</td><td>${m1.rmse.toFixed(4)} %</td></tr>
              <tr><td>MAE</td><td>${m1.mae.toFixed(4)} %</td></tr>
            </tbody></table>
          </div>
          <div>
            <h3>Coefficienti</h3>
            <table><thead><tr><th>Variabile</th><th>Coeff.</th><th>Segno</th><th>Lettura</th></tr></thead><tbody>${coefRows.join('')}</tbody></table>
          </div>
        </div>
        <hr class="divider">
        <h3>Scatter plot</h3>
        <div class="g2">
          <div><div style="font-size:12px;font-weight:600;margin-bottom:6px">Carburante vs Frequency</div><div class="chart-wrap">${mkScatter(scatCarb,simCarb,'Carburante (€/litro)','Frequency (%)')}</div></div>
          <div><div style="font-size:12px;font-weight:600;margin-bottom:6px">PaxKm vs Frequency</div><div class="chart-wrap">${mkScatter(scatPax,simPax,'PaxKm (mln)','Frequency (%)')}</div></div>
        </div>`;
    }
  } else {
    if(!aoBest?.model){content=`<div class="callout warn">Nessun modello selezionato nell'Add-on Premio. Vai alla pagina <strong>Add-on Premio</strong> e seleziona il modello migliore.</div>`}
    else{
      const mdl=aoBest.model;
      const vk=mdl.varKeys;
      const fitYrs=mdl.rows.map(r=>r.y);
      const obs=mdl.rows.map(r=>r.prem);
      const yhat=mdl.yhat;
      const residuals=mdl.residuals||obs.map((o,i)=>o-yhat[i]);
      const coefRows=[`<tr><td>Intercetta</td><td>${mdl.b[0].toFixed(2)}</td><td>—</td></tr>`,...vk.map((k,i)=>`<tr><td>${AO_VLBL[k]}</td><td>${mdl.b[i+1].toFixed(4)}</td><td>${mdl.b[i+1]>=0?'+':'−'}</td></tr>`)];
      content=`<h2>${aoBest.n}</h2>
        <div class="callout suc">Variabili: <strong>${vk.map(k=>AO_VLBL[k]).join(' + ')}</strong> | N: ${mdl.n} | R² adj: ${mdl.r2a.toFixed(4)}</div>
        <div class="g2">
          <div>
            <h3>Metriche</h3>
            <table><thead><tr><th>Metrica</th><th>Valore</th></tr></thead><tbody>
              <tr><td>R²</td><td>${mdl.r2.toFixed(4)}</td></tr>
              <tr><td>R² adj</td><td>${mdl.r2a.toFixed(4)}</td></tr>
              <tr><td>RMSE</td><td>${mdl.rmse.toFixed(2)} €</td></tr>
              <tr><td>MAE</td><td>${mdl.mae.toFixed(2)} €</td></tr>
              <tr><td>N obs.</td><td>${mdl.n}</td></tr>
            </tbody></table>
            <h3 style="margin-top:14px">Coefficienti</h3>
            <table><thead><tr><th>Variabile</th><th>Coeff.</th><th>Segno</th></tr></thead><tbody>${coefRows.join('')}</tbody></table>
            ${C.pred26main!=null?`<div class="stat suc" style="margin-top:14px"><div class="val">${Math.round(C.pred26main).toLocaleString('en-US')} €</div><div class="lbl">Premio 2026 (Simulatore)</div></div>`:''}
          </div>
          <div>
            <h3>Osservato vs Stimato</h3>
            <div class="chart-wrap">${mkFitChart(fitYrs,obs,yhat,'Premio €')}</div>
            <h3 style="margin-top:14px">Residui</h3>
            <div class="chart-wrap">${mkResidChart(fitYrs,residuals)}</div>
          </div>
        </div>`;
    }
  }
  // ── Multicollinearity (always visible)
  let mcA='',mcB='',mcFull='';
  if(!bothM1){mcA=`<div style="color:var(--text3);font-size:12px">Attiva Carburante <em>e</em> PaxKm per calcolare.</div>`}
  else{
    const r=m1corr[0][1],highCorr=Math.abs(r)>0.8;
    const vifJudge=v=>v>10?'Grave':v>5?'Alto':v>2.5?'Moderato':'Ok';
    mcA=`${highCorr?`<div class="callout warn">Alta correlazione Carburante–PaxKm (r = ${r.toFixed(3)}).</div>`:''}
    <table><thead><tr><th></th><th>Carburante</th><th>PaxKm</th></tr></thead><tbody>
      <tr><td>Carburante</td><td>${m1corr[0][0].toFixed(3)}</td><td>${m1corr[0][1].toFixed(3)}</td></tr>
      <tr><td>PaxKm</td><td>${m1corr[1][0].toFixed(3)}</td><td>${m1corr[1][1].toFixed(3)}</td></tr>
    </tbody></table>
    <table style="margin-top:8px"><thead><tr><th>Variabile</th><th>VIF</th><th>Giudizio</th></tr></thead><tbody>
      <tr ${m1vif[0]>5?'class="tr-warn"':''}><td>Carburante</td><td>${m1vif[0].toFixed(2)}</td><td>${vifJudge(m1vif[0])}</td></tr>
      <tr ${m1vif[1]>5?'class="tr-warn"':''}><td>PaxKm</td><td>${m1vif[1].toFixed(2)}</td><td>${vifJudge(m1vif[1])}</td></tr>
    </tbody></table>`;
  }
  if(!aoBest?.model){mcB=`<div style="color:var(--text3);font-size:12px">Seleziona un modello in Add-on Premio.</div>`}
  else{
    const vk=aoBest.model.varKeys;if(vk.length<2){mcB=`<div style="font-size:12px;color:var(--text3)">Solo 1 variabile — nessuna multicollinearità applicabile.</div>`}
    else{
      const rows=aoBest.model.rows;
      const cols=vk.map(k=>rows.map(d=>aoGV(d,k)));
      const cm=corrMat(cols);
      const vifB=rows.length>vk.length+1?calcVIF(rows.map(d=>vk.map(k=>aoGV(d,k)))):Array(vk.length).fill(1);
      const maxOff=Math.max(...vk.flatMap((_,i)=>vk.map((__,j)=>i!==j?Math.abs(cm[i]?.[j]??0):0)));
      const vifJudge=v=>v>10?'Grave':v>5?'Alto':v>2.5?'Moderato':'Ok';
      mcB=`${maxOff>0.8?`<div class="callout warn">Alta correlazione (max |r| = ${maxOff.toFixed(3)}). Valutare rimozione di variabili ridondanti.</div>`:''}
      <table><thead><tr><th></th>${vk.map(k=>`<th>${AO_VLBL[k]}</th>`).join('')}</tr></thead><tbody>
        ${vk.map((k,i)=>`<tr><td><strong>${AO_VLBL[k]}</strong></td>${vk.map((_,j)=>`<td>${(cm[i]?.[j]??0).toFixed(3)}</td>`).join('')}</tr>`).join('')}
      </tbody></table>
      <table style="margin-top:8px"><thead><tr><th>Variabile</th><th>VIF</th><th>Giudizio</th></tr></thead><tbody>
        ${vk.map((k,i)=>`<tr ${(vifB[i]??1)>5?'class="tr-warn"':''}><td>${AO_VLBL[k]}</td><td>${(vifB[i]??1).toFixed(2)}</td><td>${vifJudge(vifB[i]??1)}</td></tr>`).join('')}
      </tbody></table>`;
    }
  }
  if(cm6&&rows6.length>=3){
    const labs6=vk6.map(k=>AO_VLBL[k]);
    mcFull=`<table><thead><tr><th></th>${labs6.map(l=>`<th>${l}</th>`).join('')}</tr></thead><tbody>
      ${labs6.map((l,i)=>`<tr><td><strong>${l}</strong></td>${labs6.map((_,j)=>`<td>${(cm6[i]?.[j]??0).toFixed(3)}</td>`).join('')}</tr>`).join('')}
    </tbody></table>`;
  }
  return`${subNav}
    ${content}
    <hr class="divider">
    <h2>Verifica Multicollinearità</h2>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">VIF: &lt; 2.5 = Ok · 2.5–5 = Moderato · &gt; 5 = Alto · &gt; 10 = Grave</div>
    <div class="g2">
      <div class="card"><h3>Blocco A — Frequency (Carburante + PaxKm)</h3>${mcA}</div>
      <div class="card"><h3>Blocco B — Premio (${aoBest?.n??'nessun modello'})</h3>${mcB}</div>
    </div>
    <div class="card">
      <h3>Matrice correlazione completa — Dataset Premio (tutte le variabili)</h3>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">LossCost = Freq × Sev → correlazione strutturale alta con entrambe per costruzione.</div>
      <div style="overflow-x:auto">${mcFull||'<span style="color:var(--text3);font-size:12px">Dati insufficienti.</span>'}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// TAB 3 — ADD-ON PREMIO
// ═══════════════════════════════════════════════════════════════════════
function renderAddon(){
  const{allAoResults,aoBestId,aoSevAdj,aoLc2026,pred26main}=C;
  const tableRows=AO_DATA.filter(d=>d.prem!==null).map(d=>`<tr ${d.y===2020?'class="tr-warn"':''}>
    <td>${d.y}</td><td>${d.freq!=null?(d.freq*100).toFixed(3)+'%':'—'}</td>
    <td>${d.sev!=null?Math.round(d.sev).toLocaleString('en-US'):'—'}</td>
    <td>${d.prem!=null?d.prem.toFixed(1):'—'}</td>
    <td>${(d.infl*100).toFixed(2)}%</td>
    <td>${(d.eur*100).toFixed(3)}%</td>
    <td>${d.lc!=null?d.lc.toFixed(2):'—'}</td>
    <td>${d.lag1!=null?d.lag1.toFixed(1):'—'}</td>
  </tr>`).join('');
  const warn=S.avFreqAo&&S.avSevAo&&S.avLc?'<div class="callout warn">LossCost = Freq × Sev. Usarli insieme genera multicollinearità grave.</div>':'';
  const warnInfl=S.avInflD?'<div class="callout warn">Inflazione diretta: solo diagnostica. L\'inflazione agisce sulla Severity per la previsione.</div>':'';
  const modelRows=allAoResults.map(r=>{
    const isBest=r.id===aoBestId;const isRec=r.rec;
    return`<tr class="${isBest?'tr-star':''} ${r.y===2020?'tr-warn':''}">
      <td>${r.id}${isRec?' ⭐':''}</td>
      <td>${r.vars.map(k=>AO_VLBL[k]).join(' + ')||'—'}</td>
      <td>${r.model?r.model.r2.toFixed(4):'—'}</td>
      <td>${r.model?r.model.r2a.toFixed(4):'—'}</td>
      <td>${r.model?r.model.rmse.toFixed(2)+' €':'—'}</td>
      <td>${r.model?r.model.mae.toFixed(2)+' €':'—'}</td>
      <td>${r.model?String(r.model.n):'—'}</td>
      <td>${r.pred26!=null?Math.round(r.pred26).toLocaleString('en-US')+' €':'—'}</td>
      <td>${r.model?`<button class="btn${isBest?' pri':''}" onclick="S.aoManualId='${r.id}';rerender()">Usa</button>`:'—'}</td>
    </tr>`;
  }).join('');
  // Fit chart of best model
  let fitSection='';
  const best=allAoResults.find(r=>r.id===aoBestId);
  if(best?.model){
    const mdl=best.model;
    const fitYrs=mdl.rows.map(r=>r.y);
    const obs=mdl.rows.map(r=>r.prem);
    const yhat=mdl.yhat;
    const residuals=mdl.residuals||obs.map((o,i)=>o-yhat[i]);
    fitSection=`<hr class="divider"><h2>Modello attivo: ${best.n}</h2>
    <div class="g2">
      <div><h3>Osservato vs Stimato</h3><div class="chart-wrap">${mkFitChart(fitYrs,obs,yhat,'Premio €')}</div></div>
      <div><h3>Residui</h3><div class="chart-wrap">${mkResidChart(fitYrs,residuals)}</div></div>
    </div>`;
  }
  return`<div class="callout neut">Add-on — Selezione modello migliore Premio RC AUTO. Database: "20260506_DB FREQUENCY PREMIO CLEAN_V01". LossCost = Freq × Sev.</div>
  <h2>Dataset — Variabili derivate</h2>
  <div style="overflow-x:auto">
    <table><thead><tr><th>Anno</th><th>Freq %</th><th>Severity €</th><th>Premio €</th><th>Inflaz %</th><th>EURIBOR %</th><th>LossCost €</th><th>lag1 €</th></tr></thead>
    <tbody>${tableRows}</tbody></table>
  </div>
  <hr class="divider">
  <h2>Toggle variabili — Modello F (personalizzato)</h2>
  <div class="chips">
    ${chip('avFreqAo','Frequency',S.avFreqAo)}
    ${chip('avSevAo','Severity',S.avSevAo)}
    ${chip('avLc','LossCost',S.avLc)}
    ${chip('avLag1','Premio lag1',S.avLag1)}
    ${chip('avEurOn','EURIBOR 3M',S.avEurOn)}
    ${chip('avInflD','Inflazione (diag)',S.avInflD)}
  </div>
  ${warn}${warnInfl}
  <hr class="divider">
  <h2>Scenario 2026 — sliders</h2>
  <div class="g2">
    <div>
      ${sldr('aoFreq','Frequency 2026 (decimale)',0.02,0.10,0.001,'',S.aoFreq)}
      ${sldr('aoSev','Severity base 2026 (€)',3000,8000,25,'€',S.aoSev)}
      ${sldr('aoInfl','Inflazione 2026 (decimale)',-0.02,0.15,0.005,'',S.aoInfl)}
      ${sldr('aoEur','EURIBOR 3M 2026 (decimale)',-0.01,0.06,0.001,'',S.aoEur)}
    </div>
    <div class="g2">
      <div class="stat"><div class="val">${(S.aoFreq*100).toFixed(3)}%</div><div class="lbl">Frequency</div></div>
      <div class="stat"><div class="val">${Math.round(S.aoSev).toLocaleString('en-US')} €</div><div class="lbl">Severity base</div></div>
      <div class="stat info"><div class="val">${Math.round(aoSevAdj).toLocaleString('en-US')} €</div><div class="lbl">Severity adj</div></div>

function buildRegAOR(region){
  const piArr=REG_PREMIO[region];if(!piArr)return[];
  return REG_YEARS.map((y,i)=>{
    const piYi=REG_PREMIO_YEARS.indexOf(y);
    const prevYi=REG_PREMIO_YEARS.indexOf(y-1);
    const raw=_AO_RAW.find(r=>r.y===y);
    const nat=DATA.find(d=>d.anno===y);
    const freq=REG[region].freq[i]/100;
    const sev=REG[region].sev[i];
    return{y,infl:(nat?.inflazione??0)/100,freq,sev,
      prem:piYi>=0?(piArr[piYi]??null):null,
      eur:raw?raw.eur:0,lc:freq*sev,
      lag1:prevYi>=0?(piArr[prevYi]??null):null};
  });
}

// TAB 6 — PROVA REGRESSIONI (LAB)
// ═══════════════════════════════════════════════════════════════════════
function renderLab(){
  const labVars=[
    {key:'premio',lbl:'Premio (€)',data:DATA.filter(d=>d.premio!=null).map(d=>({y:d.anno,v:d.premio}))},
    {key:'frequency',lbl:'Frequency (%)',data:DATA.filter(d=>d.frequency!=null).map(d=>({y:d.anno,v:d.frequency}))},
    {key:'severity',lbl:'Severity (€)',data:DATA.filter(d=>d.severity!=null).map(d=>({y:d.anno,v:d.severity}))},
    {key:'inflazione',lbl:'Inflazione (%)',data:DATA.filter(d=>d.inflazione!=null).map(d=>({y:d.anno,v:d.inflazione}))},
    {key:'carburante',lbl:'Carburante (€/litro)',data:DATA.filter(d=>d.carburante!=null).map(d=>({y:d.anno,v:d.carburante}))},
    {key:'paxKm',lbl:'PaxKm (mln)',data:DATA.filter(d=>d.paxKm!=null).map(d=>({y:d.anno,v:d.paxKm}))},
    {key:'lc',lbl:'LossCost (€)',data:AO_DATA.filter(d=>d.lc!=null&&d.prem!=null).map(d=>({y:d.y,v:d.lc}))},
    {key:'lag1',lbl:'Premio lag1 (€)',data:AO_DATA.filter(d=>d.lag1!=null&&d.prem!=null).map(d=>({y:d.y,v:d.lag1}))},
    {key:'eur',lbl:'EURIBOR 3M',data:AO_DATA.filter(d=>d.prem!=null).map(d=>({y:d.y,v:d.eur}))},
  ];
  const yOpts=labVars.map(v=>`<option value="${v.key}"${S.labY===v.key?' selected':''}>${v.lbl}</option>`).join('');
  const xChips=labVars.filter(v=>v.key!==S.labY).map(v=>`<button class="chip${S.labX.includes(v.key)?' on':''}" onclick="labToggleX('${v.key}')">${S.labX.includes(v.key)?'●':'○'} ${v.lbl}</button>`).join('');
  // Run regression
  let result='';
  if(S.labX.length>0){
    const yVarDef=labVars.find(v=>v.key===S.labY);
    const xVarDefs=S.labX.map(k=>labVars.find(v=>v.key===k)).filter(Boolean);
    const yYrs=new Set(yVarDef.data.map(d=>d.y));
    const xYrSets=xVarDefs.map(v=>new Set(v.data.map(d=>d.y)));
    const commonYrs=[...yYrs].filter(y=>xYrSets.every(s=>s.has(y))).sort();
    if(commonYrs.length<S.labX.length+2){
      result=`<div class="callout err">Dati insufficienti (${commonYrs.length} anni comuni) per ${S.labX.length} predittori.</div>`;
    } else {
      const yArr=commonYrs.map(y=>yVarDef.data.find(d=>d.y===y).v);
      const XArr=commonYrs.map(y=>xVarDefs.map(v=>v.data.find(d=>d.y===y).v));
      const mdl=ols(XArr,yArr);
      if(!mdl){result=`<div class="callout err">Regressione non disponibile (matrice singolare?).</div>`}
      else{
        const coefRows=[`<tr><td>Intercetta</td><td>${mdl.b[0].toFixed(4)}</td><td>—</td></tr>`,...S.labX.map((k,i)=>{const lbl=labVars.find(v=>v.key===k)?.lbl||k;return`<tr><td>${lbl}</td><td>${mdl.b[i+1].toFixed(5)}</td><td>${mdl.b[i+1]>=0?'+':'−'}</td></tr>`})];
        const residuals=mdl.residuals||yArr.map((y,i)=>y-mdl.yhat[i]);
        result=`<div class="g2">
          <div>
            <h3>Metriche</h3>
            <table><thead><tr><th>Metrica</th><th>Valore</th></tr></thead><tbody>
              <tr><td>Y</td><td>${yVarDef.lbl}</td></tr>
              <tr><td>X</td><td>${S.labX.map(k=>labVars.find(v=>v.key===k)?.lbl||k).join(', ')}</td></tr>
              <tr><td>N</td><td>${mdl.n} (anni: ${commonYrs[0]}–${commonYrs[commonYrs.length-1]})</td></tr>
              <tr><td>R²</td><td>${mdl.r2.toFixed(4)}</td></tr>
              <tr><td>R² adj</td><td>${mdl.r2a.toFixed(4)}</td></tr>
              <tr><td>RMSE</td><td>${mdl.rmse.toFixed(4)}</td></tr>
              <tr><td>MAE</td><td>${mdl.mae.toFixed(4)}</td></tr>
            </tbody></table>
            <h3 style="margin-top:14px">Coefficienti</h3>
            <table><thead><tr><th>Variabile</th><th>Coeff.</th><th>Segno</th></tr></thead><tbody>${coefRows.join('')}</tbody></table>
          </div>
          <div>
            <h3>Osservato vs Stimato</h3>
            <div class="chart-wrap">${mkFitChart(commonYrs,yArr,mdl.yhat,yVarDef.lbl)}</div>
            <h3 style="margin-top:14px">Residui</h3>
            <div class="chart-wrap">${mkResidChart(commonYrs,residuals)}</div>
          </div>
        </div>`;
      }
    }
  }
  return`<div class="callout neut">Seleziona Y e una o più X per eseguire una regressione OLS personalizzata.</div>
  <div class="g2">
    <div class="card">
      <h3>Variabile dipendente (Y)</h3>
      <select onchange="S.labY=this.value;S.labX=[];rerender()" style="width:100%;padding:7px;border:1px solid var(--border);border-radius:6px;font-size:13px">${yOpts}</select>
    </div>
    <div class="card">
      <h3>Variabili indipendenti (X) — seleziona una o più</h3>
      <div class="chips">${xChips}</div>
      ${S.labX.length>0?`<button class="btn" onclick="S.labX=[];rerender()" style="margin-top:6px">Reset X</button>`:''}
    </div>
  </div>
  ${result||'<div class="card" style="color:var(--text3);font-size:13px;text-align:center;padding:40px">Seleziona almeno una variabile X per eseguire la regressione</div>'}`;
}
function labToggleX(k){if(S.labX.includes(k))S.labX=S.labX.filter(x=>x!==k);else S.labX=[...S.labX,k];rerender()}

// ═══════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════
const TABS=[
  {id:'simulator',lbl:'Simulatore RCA'},
  {id:'models',lbl:'Spiegazione modelli'},
  {id:'addon',lbl:'Add-on Premio'},
  {id:'addonfreq',lbl:'Add-on Frequenza'},
  {id:'regionale',lbl:'Regionale'},
  {id:'lab',lbl:'Prova Regressioni'},
];
function rerender(){
  compute();
  // Restore slider values after render (prevent jank)
  const savedFocus=document.activeElement?.getAttribute('data-slider');
  const savedVal=savedFocus?S[savedFocus]:null;
  // Nav
  document.getElementById('main-nav').innerHTML=TABS.map(t=>`<button class="${S.page===t.id?'active':''}" onclick="S.page='${t.id}';rerender()">${t.lbl}</button>`).join('');
  // Content
  let html='';
  if(S.page==='simulator')html=renderSimulator();
  else if(S.page==='models')html=renderModels();
  else if(S.page==='addon')html=renderAddon();
  else if(S.page==='addonfreq')html=renderAddonFreq();
  else if(S.page==='regionale')html=renderRegionale();
  else if(S.page==='lab')html=renderLab();
  document.getElementById('content').innerHTML=html;
  // Restore slider values from state
  document.querySelectorAll('input[data-slider]').forEach(el=>{
    el.value=S[el.getAttribute('data-slider')];
  });
  // Restore focus if still present
  if(savedFocus&&savedVal!==null){
    const el=document.querySelector(`input[data-slider="${savedFocus}"]`);
    if(el){el.focus();el.value=S[savedFocus]}
  }
}

// ═══════════════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('mousemove',e=>{
  const el=e.target.closest('[data-tip]');
  const tt=document.getElementById('tt');
  if(el){
    tt.innerHTML=el.getAttribute('data-tip').replace(/\n/g,'<br>');
    tt.style.display='block';
    tt.style.left=(e.clientX+14)+'px';
    tt.style.top=(e.clientY-10)+'px';
  } else {tt.style.display='none'}
});
document.addEventListener('mouseleave',()=>{document.getElementById('tt').style.display='none'},true);

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
rerender();
</script>
</body>
</html>
